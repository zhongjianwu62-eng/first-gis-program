services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: siming-gis-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gis}
      POSTGRES_USER: ${POSTGRES_USER:-gis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gis_password}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gis_user} -d ${POSTGRES_DB:-gis}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
